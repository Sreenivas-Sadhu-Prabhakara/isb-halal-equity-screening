spring:
  application:
    name: isb-halal-equity-screening

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  isb:
    serviceDomain: "Halal Equity Screening"
    businessArea: "Treasury Markets and Sukuk"
    businessDomain: "Islamic Treasury"
    functionalPattern: "Assess"
    assetType: "Equity Screening Result"
    controlRecord: "Equity Screening Result Assessment"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
